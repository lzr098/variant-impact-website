<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test</title></head>
<body>
<h2>API Test</h2>
<button onclick="test()">Click to test</button>
<pre id="out"></pre>
<script>
async function test() {
  const out = document.getElementById('out');
  out.textContent = 'Loading...';
  try {
    const res = await fetch('/api/trpc/variant.analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({json: {variant: 'chr11:121567110 C>G', options: {}}})
    });
    out.textContent += '\nStatus: ' + res.status;
    const data = await res.json();
    out.textContent += '\n' + JSON.stringify({
      success: data.result?.data?.json?.success,
      gene: data.result?.data?.json?.data?.vep?.gene_symbol,
      error: data.error?.json?.message || data.result?.data?.json?.error
    }, null, 2);
  } catch(e) {
    out.textContent = 'ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
